name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Verify tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ver = python -c "from version import APP_VERSION; print(APP_VERSION)"
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($ver -ne $tag) {
            Write-Error "Tag $tag does not match APP_VERSION $ver"
            exit 1
          }

      - name: Build exe
        run: pyinstaller --onefile --name ytdlman main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytdlman-exe
          path: dist/ytdlman.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ytdlman.exe
